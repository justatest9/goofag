name: Node Updater
on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch: # Чтобы ты мог нажать кнопку "Run"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Без этой херни коммиты не полетят!
    steps:
      - uses: actions/checkout@v4

      - name: Update File
        run: |
          # Пишем время и маты в файл
          echo "Обновлено: $(date -u -d "+3 hours" +'%Y-%m-%d %H:%M:%S') - ебаная сука" > status.txt
          # Сюда же добавим запуск твоего парсера, когда он будет готов
          # python parser.py 

      - name: Git Push
        run: |
          git config --global user.name "Github Action Bot"
          git config --global user.email "actions@github.com"
          git add status.txt
          # Коммитим только если файл реально изменился
          git diff-index --quiet HEAD || git commit --amend -m "Hourly auto-update [skip ci]"
          git push
